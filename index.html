<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TecShark的个人学习笔记</title>
  <style>
    /* 全局样式重置和基础设置 */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      max-width: 900px;
      margin: 50px auto;
      padding: 0 20px;
      font-family: "Microsoft YaHei", Arial, sans-serif;
      font-size: 18px;
      line-height: 1.6;
      color: #333;
      background-color: #f8f9fa;
    }

    /* 个人信息卡片样式 */
    .profile-card {
      display: flex;
      align-items: center;
      background-color: white;
      padding: 30px;
      border-radius: 12px;
      box-shadow: 0 2px 15px rgba(0, 0, 0, 0.08);
      margin-bottom: 40px;
      gap: 30px;
    }

    /* 头像样式 */
    .avatar {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      object-fit: cover;
      border: 4px solid #e8f4f8;
      /* 新增头像阴影，更有层次感 */
      box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
    }

    /* 个人信息文本样式 */
    .profile-info {
      flex: 1;
    }

    .profile-info h1 {
      font-size: 28px;
      color: #2d3748;
      margin-bottom: 10px;
    }

    .signature {
      font-size: 16px;
      color: #718096;
      font-style: italic;
      margin-bottom: 20px;
      padding-bottom: 15px;
      border-bottom: 1px solid #f0f4f8;
    }

    /* 联系方式样式（新增） */
    .contact-info {
      display: flex;
      flex-wrap: wrap;
      gap: 15px;
      margin-bottom: 15px;
    }

    .contact-item {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-size: 16px;
      color: #4a5568;
    }

    .contact-item svg {
      width: 18px;
      height: 18px;
      fill: #0066cc;
    }

    /* GitHub链接样式（优化） */
    .github-link {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 16px;
      background-color: #24292e;
      color: white !important;
      border-radius: 6px;
      font-size: 16px;
      transition: all 0.3s ease;
    }

    .github-link:hover {
      background-color: #404852;
      transform: none !important;
      text-decoration: none;
    }

    /* 目录区域样式 - 核心修改：增加模块间隔 */
    .notes-directory {
      background-color: white;
      padding: 30px;
      border-radius: 12px;
      box-shadow: 0 2px 15px rgba(0, 0, 0, 0.08);
      /* 新增：模块底部外边距，实现间隔 */
      margin-bottom: 25px;
      /* 新增：轻微过渡效果，更现代 */
      transition: transform 0.3s ease;
    }

    /* 鼠标悬浮模块时轻微上浮（可选，增加交互） */
    .notes-directory:hover {
      transform: translateY(-3px);
    }

    .notes-directory h2 {
      font-size: 22px;
      color: #2d3748;
      margin-bottom: 20px;
      padding-bottom: 10px;
      border-bottom: 2px solid #e8f4f8;
    }

    /* 链接样式优化 */
    ul {
      list-style: none;
    }

    li {
      margin-bottom: 15px;
    }

    a { 
      color: #0066cc; 
      text-decoration: none;
      display: inline-block;
      padding: 8px 12px;
      border-radius: 6px;
      transition: all 0.3s ease;
    }

    a:hover { 
      text-decoration: none;
      background-color: #e8f4f8;
      color: #0052a3;
      transform: translateX(5px);
    }

    /* 响应式适配 */
    @media (max-width: 600px) {
      .profile-card {
        flex-direction: column;
        text-align: center;
      }
      .avatar {
        margin-right: 0;
        margin-bottom: 20px;
      }
      .contact-info {
        justify-content: center;
      }
    }
  </style>
</head>
